<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSP : autorise React + Babel via CDN. 'unsafe-eval' nécessaire pour Babel standalone. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://wbsapi.withings.net https://account.withings.com https://api.open-meteo.com https://geocoding-api.open-meteo.com https://cdn.jsdelivr.net https://unpkg.com https://oauth2.googleapis.com https://www.googleapis.com https://accounts.google.com; base-uri 'self'; form-action 'self' https://account.withings.com https://accounts.google.com;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <title>Nebula — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/nebula-logo.svg" />

  <script>
    /* ── Détection device : mobile vs desktop ──
       Critères combinés : User-Agent + viewport + pointer
       Met data-device="mobile" ou "desktop" sur <html> AVANT que React monte. */
    (() => {
      const ua = navigator.userAgent || '';
      const isPhoneUA = /iPhone|iPod|Android.*Mobile|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      const isSmallViewport = window.matchMedia('(max-width: 768px)').matches;
      const isCoarsePointer = window.matchMedia('(pointer: coarse)').matches;
      const isMobile = isPhoneUA || (isSmallViewport && isCoarsePointer);
      document.documentElement.dataset.device = isMobile ? 'mobile' : 'desktop';
      window.__NEBULA_DEVICE__ = isMobile ? 'mobile' : 'desktop';
    })();
  </script>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const isReturningFromIntro = params.get("intro") === "done";
      const isOAuthCallback = params.has("code") || params.has("state");
      /* Callback OAuth Supabase (Google/GitHub) — hash-based */
      const isSupabaseOAuth = location.hash.includes('access_token=');

      /* ── Garde d'auth : redirige vers login.html si non connecté ── */
      if (!isOAuthCallback && !isSupabaseOAuth) {
        try {
          const raw = localStorage.getItem('dashboard_vie_auth_session');
          const s   = JSON.parse(raw || 'null');
          const ok  = s?.access_token && s.expires_at && (Date.now() / 1000 < s.expires_at - 60);
          if (!ok) {
            window.location.replace('login.html');
            return;
          }
        } catch {
          window.location.replace('login.html');
          return;
        }
      }

      const introSeen = sessionStorage.getItem("nebula_intro_seen") === "1";
      const isMobileDevice = document.documentElement.dataset.device === 'mobile';
      let introEnabled = true;
      try {
        const tweaks = JSON.parse(localStorage.getItem("dashboard_vie_tweaks") || "{}");
        introEnabled = tweaks.showIntro !== false;
      } catch {}

      /* Skip intro sur mobile (perf + safety) */
      if (introEnabled && !isReturningFromIntro && !isOAuthCallback && !introSeen && !isMobileDevice) {
        sessionStorage.setItem("nebula_intro_seen", "1");
        window.location.replace("agents-ia-intro.html");
      }
    })();
  </script>

  <!-- Google Fonts (Geist + Inter Tight + JetBrains Mono comme Geist Mono fallback) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Style refonte -->
  <link rel="stylesheet" href="assets/css/design.css" />
</head>
<body>
  <div id="root"></div>

  <!-- ════════════════════════════════════════════
       1) BRIDGE (type=module) — expose window.Nebula
          + traite le callback OAuth Withings si ?code=…
  ════════════════════════════════════════════ -->
  <script type="module" src="assets/js/design/bridge.js"></script>

  <!-- ════════════════════════════════════════════
       2) React + ReactDOM + Babel standalone (CDN)
  ════════════════════════════════════════════ -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>

  <!-- ════════════════════════════════════════════
       3) Composants JSX (Babel les compile à la volée)
          Ordre : icons → charts → app
  ════════════════════════════════════════════ -->
  <script type="text/babel" data-presets="react" src="assets/js/design/icons.jsx"></script>
  <script type="text/babel" data-presets="react" src="assets/js/design/charts.jsx"></script>
  <script type="text/babel" data-presets="react" src="assets/js/design/app.jsx"></script>
</body>
</html>
