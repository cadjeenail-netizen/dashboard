<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebula - Lancement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02030a;
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(51, 87, 166, 0.22), transparent 34%),
        radial-gradient(circle at 80% 18%, rgba(126, 65, 255, 0.18), transparent 30%),
        radial-gradient(circle at 18% 82%, rgba(255, 114, 80, 0.12), transparent 36%),
        linear-gradient(#030613, #010208 72%, #000);
      z-index: 0;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      z-index: 1;
      background-repeat: repeat;
      will-change: transform, opacity;
    }

    .stars {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,.85), transparent),
        radial-gradient(1px 1px at 140px 80px, rgba(160,205,255,.8), transparent),
        radial-gradient(1px 1px at 240px 160px, rgba(255,210,180,.75), transparent),
        radial-gradient(1px 1px at 330px 40px, rgba(255,255,255,.85), transparent);
      background-size: 380px 220px;
      animation: starDriftA 90s linear infinite;
    }

    .stars::before {
      background-image:
        radial-gradient(1.4px 1.4px at 50px 90px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.2px 1.2px at 180px 60px, rgba(130,190,255,.85), transparent),
        radial-gradient(1.6px 1.6px at 300px 170px, rgba(255,154,210,.8), transparent);
      background-size: 420px 260px;
      opacity: .68;
      animation: starDriftB 62s linear infinite, twinkle 3s ease-in-out infinite alternate;
    }

    .stars::after {
      background-image:
        radial-gradient(2px 2px at 90px 120px, rgba(255,255,255,.9), transparent),
        radial-gradient(1.7px 1.7px at 270px 60px, rgba(255,232,160,.85), transparent);
      background-size: 520px 320px;
      opacity: .42;
      animation: starDriftC 42s linear infinite, twinkle 2.2s ease-in-out infinite alternate;
    }

    @keyframes starDriftA { to { transform: translate3d(-160px, 60px, 0); } }
    @keyframes starDriftB { to { transform: translate3d(180px, -80px, 0); } }
    @keyframes starDriftC { to { transform: translate3d(-230px, -110px, 0); } }
    @keyframes twinkle { from { opacity: .35; } to { opacity: .9; } }

    #webgl {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #webgl { z-index: 5; }

    .hud {
      position: fixed;
      left: 50%;
      bottom: clamp(28px, 6vh, 64px);
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      transition: opacity .55s ease, transform .55s ease, filter .55s ease;
    }

    .hud.is-hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(18px) scale(.96);
      filter: blur(10px);
    }

    .hud h1 {
      font-size: clamp(40px, 8vw, 98px);
      line-height: .9;
      letter-spacing: -.06em;
      font-weight: 850;
      background: linear-gradient(115deg, #ffffff 0%, #93e7ff 35%, #b198ff 62%, #ff9b6c 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 34px rgba(94, 159, 255, .22);
    }

    .hud p {
      margin-top: 14px;
      font-size: clamp(10px, 1.4vw, 14px);
      letter-spacing: .34em;
      text-transform: uppercase;
      color: rgba(255,255,255,.62);
      font-weight: 700;
    }

    .open-site {
      position: fixed;
      right: 22px;
      top: 22px;
      z-index: 30;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 10px 16px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(0,0,0,.22);
      transition: transform .2s ease, background .2s ease;
    }

    .open-site:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.15);
    }

    .progress {
      position: fixed;
      left: 0;
      bottom: 0;
      z-index: 30;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, #61d8ff, #a88cff, #ff8b5f, #fff0a8);
      box-shadow: 0 0 20px rgba(144, 192, 255, .75);
    }

    .flash {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,244,202,1), rgba(255,122,45,.65) 12%, rgba(83,150,255,.18) 28%, transparent 56%);
      mix-blend-mode: screen;
    }

    .flash.burst { animation: flashBurst 1.15s ease-out forwards; }
    @keyframes flashBurst {
      0% { opacity: 0; transform: scale(.5); }
      8% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(2.5); }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <canvas id="webgl"></canvas>
  <div class="flash" id="flash"></div>

  <button class="open-site" id="openSite" type="button">Ouvrir Nebula</button>

  <section class="hud" id="hud" aria-label="Introduction Nebula">
    <h1 id="headline">Nebula</h1>
    <p id="subtitle">Dashboard orbital</p>
  </section>

  <div class="progress" id="progress"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script>
    const TARGET_URL = "index.html";
    const TOTAL_MS = 15000;
    const EXPLODE_AT = 5600;
    const REVEAL_AT = 7600;
    const FADE_AT = 14300;

    const openSite = () => { window.location.href = TARGET_URL; };
    document.getElementById("openSite").addEventListener("click", openSite);

    const start = performance.now();
    const webgl = document.getElementById("webgl");
    const progress = document.getElementById("progress");
    const hud = document.getElementById("hud");
    const headline = document.getElementById("headline");
    const subtitle = document.getElementById("subtitle");
    const flash = document.getElementById("flash");

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(44, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, 0, 5.4);

    const renderer = new THREE.WebGLRenderer({ canvas: webgl, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const keyLight = new THREE.DirectionalLight(0xfff1d8, 2.2);
    keyLight.position.set(4, 2.5, 5);
    scene.add(keyLight);
    scene.add(new THREE.AmbientLight(0x25334f, 0.55));
    const rimLight = new THREE.DirectionalLight(0x74bbff, 1.25);
    rimLight.position.set(-4, 1, -3);
    scene.add(rimLight);

    function createPlanetTexture() {
      const c = document.createElement("canvas");
      c.width = 2048;
      c.height = 1024;
      const ctx = c.getContext("2d");

      const bands = [
        ["#25104b", "#5c2f91", "#a46dff"],
        ["#07345c", "#178ec0", "#78e7ff"],
        ["#4f1577", "#d14dc4", "#ff96df"],
        ["#7b2d22", "#f26b3f", "#ffd08a"],
        ["#152d6f", "#4b70ff", "#b9c8ff"],
        ["#271654", "#7d5dff", "#3adbd5"],
      ];
      for (let y = 0; y < c.height; y++) {
        const t = y / c.height;
        const wobble = Math.sin(t * Math.PI * 18) * 24 + Math.sin(t * Math.PI * 41) * 9;
        const band = bands[Math.floor((t * bands.length * 2.2 + Math.sin(t * 13) * .8) % bands.length)];
        const g = ctx.createLinearGradient(0, y, c.width, y + wobble);
        g.addColorStop(0, band[0]);
        g.addColorStop(.5, band[1]);
        g.addColorStop(1, band[2]);
        ctx.fillStyle = g;
        ctx.fillRect(0, y, c.width, 2);
      }

      for (let i = 0; i < 150; i++) {
        const x = Math.random() * c.width;
        const y = Math.random() * c.height;
        const rx = 80 + Math.random() * 260;
        const ry = 8 + Math.random() * 34;
        const g = ctx.createRadialGradient(x, y, 0, x, y, rx);
        g.addColorStop(0, `rgba(255,255,255,${.08 + Math.random() * .18})`);
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(x, y, rx, ry, Math.random() * .25, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalCompositeOperation = "screen";
      const storm = ctx.createRadialGradient(1420, 560, 0, 1420, 560, 190);
      storm.addColorStop(0, "rgba(255,240,180,.85)");
      storm.addColorStop(.38, "rgba(255,120,120,.45)");
      storm.addColorStop(.8, "rgba(120,60,255,.15)");
      storm.addColorStop(1, "rgba(120,60,255,0)");
      ctx.fillStyle = storm;
      ctx.beginPath();
      ctx.ellipse(1420, 560, 210, 78, -.12, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = "source-over";

      const texture = new THREE.CanvasTexture(c);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function createNoiseTexture(size = 1024) {
      const c = document.createElement("canvas");
      c.width = size;
      c.height = size / 2;
      const ctx = c.getContext("2d");
      const img = ctx.createImageData(c.width, c.height);
      for (let i = 0; i < img.data.length; i += 4) {
        const v = 118 + Math.random() * 72;
        img.data[i] = img.data[i + 1] = img.data[i + 2] = v;
        img.data[i + 3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      return new THREE.CanvasTexture(c);
    }

    function createCloudTexture() {
      const c = document.createElement("canvas");
      c.width = 2048;
      c.height = 1024;
      const ctx = c.getContext("2d");
      ctx.clearRect(0, 0, c.width, c.height);
      for (let band = 0; band < 7; band++) {
        const y = 120 + band * 125 + Math.random() * 30;
        for (let i = 0; i < 92; i++) {
          const x = Math.random() * c.width;
          const yy = y + (Math.random() - .5) * 92;
          const rx = 42 + Math.random() * 130;
          const ry = 12 + Math.random() * 32;
          const g = ctx.createRadialGradient(x, yy, 0, x, yy, rx);
          g.addColorStop(0, `rgba(255,255,255,${.32 + Math.random() * .48})`);
          g.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.ellipse(x, yy, rx, ry, Math.random() * Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      return new THREE.CanvasTexture(c);
    }

    const planetGroup = new THREE.Group();
    scene.add(planetGroup);

    const planet = new THREE.Mesh(
      new THREE.SphereGeometry(1.45, 128, 128),
      new THREE.MeshPhongMaterial({
        map: createPlanetTexture(),
        bumpMap: createNoiseTexture(),
        bumpScale: .045,
        specular: new THREE.Color(0x243955),
        shininess: 18,
      })
    );
    planetGroup.add(planet);

    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(1.485, 96, 96),
      new THREE.MeshPhongMaterial({
        map: createCloudTexture(),
        transparent: true,
        opacity: .64,
        depthWrite: false,
      })
    );
    planetGroup.add(clouds);

    const ringTexture = createPlanetTexture();
    const rings = new THREE.Mesh(
      new THREE.RingGeometry(1.82, 2.72, 192),
      new THREE.MeshBasicMaterial({
        map: ringTexture,
        transparent: true,
        opacity: .78,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
      })
    );
    rings.rotation.x = Math.PI / 2.45;
    rings.rotation.y = .18;
    planetGroup.add(rings);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.64, 96, 96),
      new THREE.ShaderMaterial({
        transparent: true,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        vertexShader: "varying vec3 n; void main(){ n=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }",
        fragmentShader: "varying vec3 n; void main(){ float i=pow(.78-dot(n,vec3(0.,0.,1.)),2.25); gl_FragColor=vec4(.36,.67,1.,1.)*i; }",
      })
    );
    planetGroup.add(atmosphere);

    const starPositions = new Float32Array(1800 * 3);
    for (let i = 0; i < 1800; i++) {
      const radius = 48 + Math.random() * 72;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 2 - 1);
      starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
      starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      starPositions[i * 3 + 2] = radius * Math.cos(phi);
    }
    const stars3dGeo = new THREE.BufferGeometry();
    stars3dGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
    const stars3d = new THREE.Points(stars3dGeo, new THREE.PointsMaterial({
      color: 0xffffff,
      size: .32,
      transparent: true,
      opacity: .82,
      sizeAttenuation: true,
    }));
    scene.add(stars3d);

    const explosion = {
      done: false,
      t: 0,
      flash: null,
      fragments: [],
      shockwaves: [],
      dust: null,
    };

    function triggerExplosion() {
      if (explosion.done) return;
      explosion.done = true;
      explosion.t = performance.now();
      planetGroup.visible = false;
      hud.classList.add("is-hidden");
      flash.classList.remove("burst");
      void flash.offsetWidth;
      flash.classList.add("burst");

      const fireLight = new THREE.PointLight(0xffa24f, 9, 28);
      scene.add(fireLight);
      setTimeout(() => scene.remove(fireLight), 2100);

      explosion.flash = new THREE.Mesh(
        new THREE.SphereGeometry(.9, 48, 48),
        new THREE.MeshBasicMaterial({ color: 0xfff0c2, transparent: true, opacity: 1, blending: THREE.AdditiveBlending })
      );
      scene.add(explosion.flash);

      const shockColors = [0xffc070, 0x73cfff, 0xff6b35];
      for (let i = 0; i < 3; i++) {
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(1.25 + i * .08, 1.42 + i * .1, 96),
          new THREE.MeshBasicMaterial({
            color: shockColors[i],
            transparent: true,
            opacity: .85 - i * .12,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
          })
        );
        ring.lookAt(camera.position);
        scene.add(ring);
        explosion.shockwaves.push({ mesh: ring, born: performance.now() + i * 150, speed: 4.6 + i * 1.15 });
      }

      const rockColors = [0x4a2b1d, 0x6c4730, 0x8a6244, 0x39231a, 0x76553a];
      for (let i = 0; i < 72; i++) {
        const size = .055 + Math.random() * .28;
        const geos = [
          new THREE.IcosahedronGeometry(size, 0),
          new THREE.DodecahedronGeometry(size, 0),
          new THREE.OctahedronGeometry(size, 0),
          new THREE.TetrahedronGeometry(size * 1.35, 0),
        ];
        const geo = geos[Math.floor(Math.random() * geos.length)];
        const pos = geo.attributes.position;
        for (let p = 0; p < pos.count; p++) {
          pos.setXYZ(p, pos.getX(p) * (.68 + Math.random() * .65), pos.getY(p) * (.68 + Math.random() * .65), pos.getZ(p) * (.68 + Math.random() * .65));
        }
        geo.computeVertexNormals();
        const mat = new THREE.MeshPhongMaterial({
          color: rockColors[Math.floor(Math.random() * rockColors.length)],
          flatShading: true,
          shininess: 7,
          emissive: new THREE.Color(0xff5b1f),
          emissiveIntensity: .62 + Math.random() * .55,
        });
        const mesh = new THREE.Mesh(geo, mat);
        const dir = new THREE.Vector3(Math.random() - .5, Math.random() - .5, Math.random() - .5).normalize();
        mesh.position.copy(dir.clone().multiplyScalar(.12 + Math.random() * .45));
        scene.add(mesh);
        explosion.fragments.push({
          mesh,
          mat,
          velocity: dir.multiplyScalar(.045 + Math.random() * .115),
          spin: new THREE.Vector3((Math.random() - .5) * .15, (Math.random() - .5) * .15, (Math.random() - .5) * .15),
        });
      }

      const count = 2000;
      const dustGeo = new THREE.BufferGeometry();
      const dustPositions = new Float32Array(count * 3);
      const dustColors = new Float32Array(count * 3);
      const velocities = [];
      for (let i = 0; i < count; i++) {
        const dir = new THREE.Vector3(Math.random() - .5, Math.random() - .5, Math.random() - .5).normalize();
        velocities.push(dir.multiplyScalar(.02 + Math.random() * .075));
        dustColors[i * 3] = 1;
        dustColors[i * 3 + 1] = .32 + Math.random() * .55;
        dustColors[i * 3 + 2] = .06 + Math.random() * .22;
      }
      dustGeo.setAttribute("position", new THREE.BufferAttribute(dustPositions, 3));
      dustGeo.setAttribute("color", new THREE.BufferAttribute(dustColors, 3));
      const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
        size: .055,
        transparent: true,
        opacity: .94,
        blending: THREE.AdditiveBlending,
        vertexColors: true,
        sizeAttenuation: true,
      }));
      scene.add(dust);
      explosion.dust = { mesh: dust, velocities };
    }

    function animate() {
      const now = performance.now();
      const elapsed = now - start;
      progress.style.width = Math.min(100, elapsed / TOTAL_MS * 100) + "%";

      if (elapsed >= EXPLODE_AT) triggerExplosion();
      if (elapsed >= REVEAL_AT && hud.classList.contains("is-hidden")) {
        headline.textContent = "Nebula";
        subtitle.textContent = "Bienvenue dans ton univers";
        hud.classList.remove("is-hidden");
      }
      if (elapsed >= FADE_AT) {
        document.body.style.transition = "opacity .7s ease";
        document.body.style.opacity = "0";
      }
      if (elapsed >= TOTAL_MS) return openSite();

      if (!explosion.done) {
        planet.rotation.y += .0052;
        clouds.rotation.y += .0071;
        clouds.rotation.x += .0006;
        planetGroup.rotation.x = Math.sin(elapsed * .00045) * .055;
        planetGroup.rotation.z = Math.sin(elapsed * .00031) * .025;
      } else {
        const age = (now - explosion.t) / 1000;
        if (explosion.flash) {
          explosion.flash.scale.setScalar(1 + age * 5.8);
          explosion.flash.material.opacity = Math.max(0, 1 - age * 1.55);
          if (explosion.flash.material.opacity <= 0) {
            scene.remove(explosion.flash);
            explosion.flash = null;
          }
        }
        explosion.shockwaves.forEach(s => {
          const a = Math.max(0, (now - s.born) / 1000);
          s.mesh.scale.setScalar(1 + a * s.speed);
          s.mesh.material.opacity = Math.max(0, .82 - a * .68);
          s.mesh.lookAt(camera.position);
        });
        explosion.fragments.forEach(f => {
          f.mesh.position.add(f.velocity);
          f.mesh.rotation.x += f.spin.x;
          f.mesh.rotation.y += f.spin.y;
          f.mesh.rotation.z += f.spin.z;
          f.velocity.multiplyScalar(.993);
          f.mat.emissiveIntensity *= .985;
          if (age > 4.2) {
            f.mat.transparent = true;
            f.mat.opacity = Math.max(0, 1 - (age - 4.2) * .42);
          }
        });
        if (explosion.dust) {
          const pos = explosion.dust.mesh.geometry.attributes.position;
          for (let i = 0; i < pos.count; i++) {
            pos.array[i * 3] += explosion.dust.velocities[i].x;
            pos.array[i * 3 + 1] += explosion.dust.velocities[i].y;
            pos.array[i * 3 + 2] += explosion.dust.velocities[i].z;
            explosion.dust.velocities[i].multiplyScalar(.987);
          }
          pos.needsUpdate = true;
          explosion.dust.mesh.material.opacity = Math.max(0, .95 - age * .18);
        }
      }

      stars3d.rotation.y += .00018;
      stars3d.rotation.x += .00008;
      renderer.render(scene, camera);

      requestAnimationFrame(animate);
    }

    function resize() {
      renderer.setSize(innerWidth, innerHeight);
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
    }

    addEventListener("resize", resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
