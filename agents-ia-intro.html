<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>agents-ia.re — Lancement</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }

  /* Fond étoilé parallaxe (3 couches CSS) */
  .stars-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at center, #0a0820 0%, #050310 60%, #000 100%);
  }
  .stars-layer {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }
  .stars-far {
    background-image:
      radial-gradient(0.8px 0.8px at 13% 22%, white, transparent),
      radial-gradient(1px 1px at 28% 64%, white, transparent),
      radial-gradient(0.8px 0.8px at 41% 14%, #b8a4ff, transparent),
      radial-gradient(0.6px 0.6px at 56% 81%, white, transparent),
      radial-gradient(1px 1px at 68% 34%, #6dd5f4, transparent),
      radial-gradient(0.6px 0.6px at 73% 56%, white, transparent),
      radial-gradient(1px 1px at 84% 78%, #ff8cc4, transparent),
      radial-gradient(0.8px 0.8px at 92% 14%, white, transparent),
      radial-gradient(0.6px 0.6px at 8%  88%, white, transparent),
      radial-gradient(0.8px 0.8px at 49% 50%, white, transparent),
      radial-gradient(0.6px 0.6px at 19% 73%, white, transparent),
      radial-gradient(1px 1px at 35% 41%, #c5b3ff, transparent),
      radial-gradient(0.7px 0.7px at 65% 18%, white, transparent),
      radial-gradient(0.8px 0.8px at 88% 55%, white, transparent),
      radial-gradient(0.6px 0.6px at 4% 35%, white, transparent);
    background-size: 100% 100%;
    animation: parallax-far 120s linear infinite;
  }
  .stars-mid {
    background-image:
      radial-gradient(1.2px 1.2px at 18% 32%, white, transparent),
      radial-gradient(1.5px 1.5px at 75% 28%, #6dd5f4, transparent),
      radial-gradient(1.4px 1.4px at 42% 78%, #ff8cc4, transparent),
      radial-gradient(1.6px 1.6px at 92% 65%, #ffe07a, transparent),
      radial-gradient(1.2px 1.2px at 8%  68%, white, transparent),
      radial-gradient(1.4px 1.4px at 60% 12%, #b8a4ff, transparent);
    background-size: 100% 100%;
    animation: twinkle 2.5s ease-in-out infinite alternate, parallax-mid 80s linear infinite;
  }
  @keyframes twinkle {
    from { opacity: 0.55; }
    to   { opacity: 1; }
  }
  @keyframes parallax-far { to { background-position: -100% 0; } }
  @keyframes parallax-mid { to { background-position: 100% 0; } }

  #three-canvas {
    position: fixed; inset: 0; z-index: 5;
    display: block;
  }
  #fw-canvas {
    position: fixed; inset: 0; z-index: 10;
    pointer-events: none;
    display: block;
  }

  .skip-btn {
    position: fixed;
    top: 24px; right: 24px;
    z-index: 100;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.9);
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .skip-btn:hover {
    background: rgba(255,255,255,0.14);
    transform: translateY(-1px);
  }

  .title-block {
    position: fixed;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    animation: title-appear 0.8s ease 1.2s forwards;
  }
  .title-block.fade-out {
    animation: title-fade 0.6s ease forwards;
  }
  .title-block.reveal {
    animation: title-reveal 1s ease forwards;
  }
  .title-main {
    font-size: clamp(36px, 7vw, 76px);
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(120deg, #b8a4ff 0%, #6dd5f4 50%, #ff8cc4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(124,92,255,0.5);
    line-height: 1;
  }
  .title-sub {
    font-size: clamp(11px, 1.4vw, 14px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-top: 14px;
    font-weight: 500;
  }
  @keyframes title-appear {
    from { opacity: 0; transform: translate(-50%, 12px); letter-spacing: 0.05em; }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes title-fade {
    to { opacity: 0; transform: translate(-50%, 0) scale(1.15); filter: blur(12px); }
  }
  @keyframes title-reveal {
    from { opacity: 0; transform: translate(-50%, 30px) scale(0.85); filter: blur(8px); }
    to   { opacity: 1; transform: translate(-50%, 0) scale(1);    filter: blur(0); }
  }

  .loading {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .progress-bar {
    position: fixed;
    bottom: 0; left: 0;
    z-index: 80;
    height: 2px;
    background: linear-gradient(90deg, #b8a4ff, #6dd5f4, #ff8cc4);
    box-shadow: 0 0 12px rgba(184,164,255,0.6);
    width: 0%;
    transition: width 0.1s linear;
  }
</style>
</head>
<body>
  <div class="stars-bg"></div>
  <div class="stars-layer stars-far"></div>
  <div class="stars-layer stars-mid"></div>

  <canvas id="three-canvas"></canvas>
  <canvas id="fw-canvas"></canvas>

  <div class="loading" id="loading">Chargement…</div>

  <button class="skip-btn" onclick="goToSite()" title="Passer l'intro">Passer →</button>

  <div class="title-block" id="title-block">
    <div class="title-main">Agents IA</div>
    <div class="title-sub">Réunion · agents-ia.re</div>
  </div>

  <div class="progress-bar" id="progress"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
'use strict';

const TARGET_URL = 'https://agents-ia.re';
const TIMELINE = {
  EXPLOSION: 6000,    // 0-6s : planète tourne
  FIREWORKS: 8200,    // 6-8s : explosion
  FW_END:    13500,   // 8-13.5s : feux d'artifice
  FINAL_FADE:14200,   // 13.5-14s : fade
  REDIRECT:  15000,   // 15s : redirect
};

function goToSite() { window.location.href = TARGET_URL; }

const T0 = performance.now();

/* ════════════════════════════════════════════════
   THREE.JS — PLANÈTE
═══════════════════════════════════════════════════ */
const threeCanvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({
  canvas: threeCanvas, antialias: true, alpha: true,
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

/* ── Texture procédurale type Terre ── */
function makePlanetTexture() {
  const c = document.createElement('canvas');
  c.width = 2048; c.height = 1024;
  const ctx = c.getContext('2d');

  /* Océan profond avec gradient latitudinal */
  const ocean = ctx.createLinearGradient(0, 0, 0, 1024);
  ocean.addColorStop(0,    '#0a2540');
  ocean.addColorStop(0.5,  '#1a4d7a');
  ocean.addColorStop(1,    '#0a2540');
  ctx.fillStyle = ocean;
  ctx.fillRect(0, 0, 2048, 1024);

  /* Continents (blobs irréguliers, mix vert/marron) */
  const drawContinent = (cx, cy, baseR, hue) => {
    ctx.save();
    ctx.beginPath();
    const points = 22;
    for (let i = 0; i <= points; i++) {
      const a = (i / points) * Math.PI * 2;
      const r = baseR * (0.55 + Math.random() * 0.55);
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r * 0.8;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 1.3);
    if (hue === 'forest') {
      g.addColorStop(0,   '#3d8b3d');
      g.addColorStop(0.5, '#2d6f2d');
      g.addColorStop(1,   '#1a4a2a');
    } else if (hue === 'desert') {
      g.addColorStop(0,   '#d4a76a');
      g.addColorStop(0.6, '#a07840');
      g.addColorStop(1,   '#6b4f28');
    } else {
      g.addColorStop(0,   '#5a8c4a');
      g.addColorStop(0.5, '#3d6f3d');
      g.addColorStop(1,   '#2a4a30');
    }
    ctx.fillStyle = g;
    ctx.fill();
    /* Côtes plus claires */
    ctx.strokeStyle = 'rgba(255,230,180,0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  };

  const continents = [
    { x: 320,  y: 380, r: 180, hue: 'forest'  },
    { x: 680,  y: 280, r: 130, hue: 'desert'  },
    { x: 1120, y: 420, r: 220, hue: 'forest'  },
    { x: 1500, y: 600, r: 150, hue: 'desert'  },
    { x: 1800, y: 380, r: 120, hue: 'mixed'   },
    { x: 280,  y: 720, r: 170, hue: 'forest'  },
    { x: 950,  y: 750, r: 140, hue: 'mixed'   },
    { x: 1700, y: 800, r: 110, hue: 'forest'  },
    { x: 500,  y: 550, r: 90,  hue: 'mixed'   },
  ];
  continents.forEach(c => drawContinent(c.x, c.y, c.r, c.hue));

  /* Petites îles aléatoires */
  for (let i = 0; i < 40; i++) {
    drawContinent(Math.random()*2048, 200 + Math.random()*624, 15 + Math.random()*30, Math.random() < 0.5 ? 'forest' : 'mixed');
  }

  /* Calottes polaires */
  const north = ctx.createLinearGradient(0, 0, 0, 180);
  north.addColorStop(0,   'rgba(255,255,255,0.98)');
  north.addColorStop(0.6, 'rgba(240,250,255,0.7)');
  north.addColorStop(1,   'rgba(220,240,255,0)');
  ctx.fillStyle = north;
  ctx.fillRect(0, 0, 2048, 180);

  const south = ctx.createLinearGradient(0, 850, 0, 1024);
  south.addColorStop(0, 'rgba(220,240,255,0)');
  south.addColorStop(0.4, 'rgba(240,250,255,0.7)');
  south.addColorStop(1, 'rgba(255,255,255,0.98)');
  ctx.fillStyle = south;
  ctx.fillRect(0, 850, 2048, 174);

  /* Petites variations atmosphériques de couleur (zones tropicales plus claires) */
  for (let i = 0; i < 80; i++) {
    ctx.fillStyle = `rgba(${100 + Math.random()*100}, ${150 + Math.random()*80}, ${200 + Math.random()*55}, ${0.04 + Math.random()*0.06})`;
    ctx.beginPath();
    ctx.ellipse(Math.random()*2048, 250 + Math.random()*524, 60 + Math.random()*120, 20 + Math.random()*40, Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }

  return new THREE.CanvasTexture(c);
}

function makeBumpTexture() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, 1024, 512);
  const img = ctx.getImageData(0, 0, 1024, 512);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 128 + (Math.random() - 0.5) * 90;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
  }
  ctx.putImageData(img, 0, 0);
  return new THREE.CanvasTexture(c);
}

function makeCloudTexture() {
  const c = document.createElement('canvas');
  c.width = 2048; c.height = 1024;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 2048, 1024);
  /* Bandes de nuages stylisées */
  for (let band = 0; band < 6; band++) {
    const y = 150 + band * 130 + Math.random() * 40;
    for (let i = 0; i < 80; i++) {
      const x = Math.random() * 2048;
      const yy = y + (Math.random() - 0.5) * 80;
      const r = 30 + Math.random() * 90;
      const grd = ctx.createRadialGradient(x, yy, 0, x, yy, r);
      grd.addColorStop(0, `rgba(255,255,255,${0.5 + Math.random()*0.4})`);
      grd.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.ellipse(x, yy, r, r * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  return new THREE.CanvasTexture(c);
}

/* ── Planète ── */
const planetGroup = new THREE.Group();
const planetGeo = new THREE.SphereGeometry(1.4, 96, 96);
const planetMat = new THREE.MeshPhongMaterial({
  map: makePlanetTexture(),
  bumpMap: makeBumpTexture(),
  bumpScale: 0.05,
  specular: new THREE.Color(0x444466),
  shininess: 12,
});
const planet = new THREE.Mesh(planetGeo, planetMat);
planetGroup.add(planet);

/* ── Couche de nuages ── */
const cloudGeo = new THREE.SphereGeometry(1.43, 96, 96);
const cloudMat = new THREE.MeshPhongMaterial({
  map: makeCloudTexture(),
  transparent: true,
  opacity: 0.6,
  depthWrite: false,
});
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
planetGroup.add(clouds);

/* ── Atmosphère lumineuse (shader Fresnel) ── */
const atmGeo = new THREE.SphereGeometry(1.62, 64, 64);
const atmMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vPosition = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      float intensity = pow(0.72 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
      gl_FragColor = vec4(0.4, 0.7, 1.0, 1.0) * intensity;
    }
  `,
  blending: THREE.AdditiveBlending,
  side: THREE.BackSide,
  transparent: true,
});
const atmosphere = new THREE.Mesh(atmGeo, atmMat);
planetGroup.add(atmosphere);

scene.add(planetGroup);

/* ── Éclairage : soleil + lumière ambiante bleutée ── */
const sun = new THREE.DirectionalLight(0xfff4e0, 1.6);
sun.position.set(5, 2, 4);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x303050, 0.45));

/* ── Lueur arrière sur la planète (rim light) ── */
const rim = new THREE.DirectionalLight(0x6688aa, 0.6);
rim.position.set(-3, 1, -2);
scene.add(rim);

/* ── Étoiles 3D parallaxe ── */
const starGeo = new THREE.BufferGeometry();
const starCount = 1500;
const starPos = new Float32Array(starCount * 3);
const starSize = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  const r = 40 + Math.random() * 60;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(Math.random() * 2 - 1);
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3+2] = r * Math.cos(phi);
  starSize[i] = 0.2 + Math.random() * 0.4;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.35, transparent: true, opacity: 0.9,
  sizeAttenuation: true,
});
const stars3D = new THREE.Points(starGeo, starMat);
scene.add(stars3D);

/* ════════════════════════════════════════════════
   EXPLOSION
═══════════════════════════════════════════════════ */
const explosionState = {
  triggered: false,
  fragments: [],
  flash: null,
  shockwaves: [],
  dust: null,
  startTime: 0,
};

function triggerExplosion() {
  if (explosionState.triggered) return;
  explosionState.triggered = true;
  explosionState.startTime = performance.now();

  /* Cacher la planète */
  planetGroup.visible = false;

  /* Boule de feu centrale */
  const flashGeo = new THREE.SphereGeometry(0.9, 32, 32);
  const flashMat = new THREE.MeshBasicMaterial({
    color: 0xfff0c8, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending,
  });
  explosionState.flash = new THREE.Mesh(flashGeo, flashMat);
  scene.add(explosionState.flash);

  /* Onde de choc 1 (jaune/orange) */
  const sw1 = new THREE.Mesh(
    new THREE.RingGeometry(1.4, 1.65, 64),
    new THREE.MeshBasicMaterial({ color: 0xffaa55, transparent: true, opacity: 0.85, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
  );
  sw1.lookAt(camera.position);
  scene.add(sw1);
  explosionState.shockwaves.push({ mesh: sw1, speed: 4.5, born: performance.now() });

  /* Onde de choc 2 (bleu) plus rapide */
  setTimeout(() => {
    const sw2 = new THREE.Mesh(
      new THREE.RingGeometry(1.3, 1.5, 64),
      new THREE.MeshBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
    );
    sw2.lookAt(camera.position);
    scene.add(sw2);
    explosionState.shockwaves.push({ mesh: sw2, speed: 6, born: performance.now() });
  }, 150);

  /* Fragments rocheux (varied geometries) */
  const rockColors = [0x6b4a32, 0x5a3a25, 0x7d5a3e, 0x4a2e1c, 0x8c6b4a, 0x6f5039];
  const fragCount = 45;
  for (let i = 0; i < fragCount; i++) {
    const size = 0.08 + Math.random() * 0.28;
    let geo;
    const r = Math.random();
    if (r < 0.4) geo = new THREE.IcosahedronGeometry(size, 0);
    else if (r < 0.7) geo = new THREE.DodecahedronGeometry(size, 0);
    else if (r < 0.9) geo = new THREE.OctahedronGeometry(size, 0);
    else geo = new THREE.TetrahedronGeometry(size * 1.2, 0);

    /* Déformer les sommets pour un look plus rocheux */
    const pos = geo.attributes.position;
    for (let j = 0; j < pos.count; j++) {
      pos.setXYZ(j,
        pos.getX(j) * (0.7 + Math.random() * 0.5),
        pos.getY(j) * (0.7 + Math.random() * 0.5),
        pos.getZ(j) * (0.7 + Math.random() * 0.5),
      );
    }
    geo.computeVertexNormals();

    const mat = new THREE.MeshPhongMaterial({
      color: rockColors[Math.floor(Math.random() * rockColors.length)],
      flatShading: true,
      shininess: 5,
      emissive: new THREE.Color(0xff6622),
      emissiveIntensity: 0.4 + Math.random() * 0.4,
    });
    const m = new THREE.Mesh(geo, mat);

    const dir = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2
    ).normalize();
    const speed = 0.04 + Math.random() * 0.10;

    explosionState.fragments.push({
      mesh: m,
      vel: dir.clone().multiplyScalar(speed),
      angVel: new THREE.Vector3(
        (Math.random() - 0.5) * 0.15,
        (Math.random() - 0.5) * 0.15,
        (Math.random() - 0.5) * 0.15
      ),
      mat,
    });
    scene.add(m);
  }

  /* Particules de poussière incandescente */
  const dustCount = 1500;
  const dustGeo = new THREE.BufferGeometry();
  const dustPos = new Float32Array(dustCount * 3);
  const dustVel = new Array(dustCount);
  const dustCol = new Float32Array(dustCount * 3);
  for (let i = 0; i < dustCount; i++) {
    dustPos[i*3] = dustPos[i*3+1] = dustPos[i*3+2] = 0;
    const dir = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2
    ).normalize().multiplyScalar(0.025 + Math.random() * 0.07);
    dustVel[i] = dir;
    /* Couleur orange→rouge→jaune */
    const t = Math.random();
    dustCol[i*3]   = 1.0;
    dustCol[i*3+1] = 0.4 + t * 0.5;
    dustCol[i*3+2] = 0.1 + t * 0.2;
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
  dustGeo.setAttribute('color', new THREE.BufferAttribute(dustCol, 3));
  const dustMat = new THREE.PointsMaterial({
    size: 0.06, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending,
    vertexColors: true,
    sizeAttenuation: true,
  });
  explosionState.dust = { mesh: new THREE.Points(dustGeo, dustMat), vel: dustVel };
  scene.add(explosionState.dust.mesh);

  /* Éclair lumineux temporaire */
  const flashLight = new THREE.PointLight(0xffaa55, 6, 30);
  flashLight.position.set(0, 0, 0);
  scene.add(flashLight);
  setTimeout(() => { flashLight.intensity = 2; }, 200);
  setTimeout(() => { flashLight.intensity = 0.5; }, 600);
  setTimeout(() => { scene.remove(flashLight); }, 1500);

  /* Fade du titre */
  document.getElementById('title-block').classList.add('fade-out');
}

/* ════════════════════════════════════════════════
   FEUX D'ARTIFICE — Canvas 2D
═══════════════════════════════════════════════════ */
const fwCanvas = document.getElementById('fw-canvas');
const fwCtx = fwCanvas.getContext('2d');
fwCanvas.width = window.innerWidth;
fwCanvas.height = window.innerHeight;

const rockets = [];
const sparks  = [];
const trails  = [];
let fwActive = false;

function spawnRocket() {
  if (!fwActive) return;
  rockets.push({
    x: window.innerWidth * (0.15 + Math.random() * 0.7),
    y: window.innerHeight + 10,
    vx: (Math.random() - 0.5) * 1.8,
    vy: -(11 + Math.random() * 4),
    color: `hsl(${Math.random() * 360}, 100%, 65%)`,
    explodeY: window.innerHeight * (0.12 + Math.random() * 0.32),
    trailFrames: 0,
  });
}

function explodeRocket(r) {
  const burstType = Math.random();
  const baseHue = Math.random() * 360;
  let count = 80 + Math.floor(Math.random() * 50);

  if (burstType < 0.3) {
    /* Étoile classique : sparks rayonnants avec gravité */
    for (let i = 0; i < count; i++) {
      const a = (Math.PI * 2 * i) / count;
      const speed = 3 + Math.random() * 4.5;
      sparks.push({
        x: r.x, y: r.y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        life: 1,
        decay: 0.006 + Math.random() * 0.008,
        color: `hsl(${baseHue + (Math.random() - 0.5) * 30}, 100%, ${60 + Math.random() * 25}%)`,
        size: 1.2 + Math.random() * 2,
        gravity: 0.06,
        friction: 0.985,
        trail: true,
      });
    }
  } else if (burstType < 0.6) {
    /* Saule pleureur : lentes, longue durée */
    count = 100;
    for (let i = 0; i < count; i++) {
      const a = (Math.PI * 2 * i) / count + Math.random() * 0.05;
      const speed = 2 + Math.random() * 2.5;
      sparks.push({
        x: r.x, y: r.y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed - 1,
        life: 1.2,
        decay: 0.004,
        color: `hsl(${baseHue}, 100%, ${65 + Math.random() * 20}%)`,
        size: 1.5 + Math.random() * 1.5,
        gravity: 0.09,
        friction: 0.99,
        trail: true,
      });
    }
  } else if (burstType < 0.85) {
    /* Multi-couleurs : 3 couches de couleurs */
    const layers = 3;
    for (let l = 0; l < layers; l++) {
      const hue = (baseHue + l * 120) % 360;
      const layerCount = 50;
      const speed = 2 + l * 1.2;
      for (let i = 0; i < layerCount; i++) {
        const a = (Math.PI * 2 * i) / layerCount + Math.random() * 0.1;
        sparks.push({
          x: r.x, y: r.y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          life: 1,
          decay: 0.008,
          color: `hsl(${hue}, 100%, 65%)`,
          size: 1.5 + Math.random() * 1.5,
          gravity: 0.06,
          friction: 0.985,
          trail: true,
        });
      }
    }
  } else {
    /* Crackle : petites étincelles brillantes */
    count = 200;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 6;
      sparks.push({
        x: r.x, y: r.y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        life: 0.6 + Math.random() * 0.4,
        decay: 0.015 + Math.random() * 0.015,
        color: `hsl(${baseHue + (Math.random() - 0.5) * 80}, 100%, 75%)`,
        size: 0.8 + Math.random() * 1.2,
        gravity: 0.04,
        friction: 0.97,
        trail: false,
      });
    }
  }
}

function updateFireworks() {
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  fwCtx.globalCompositeOperation = 'lighter';

  /* Trails persistants (effet "brûlure") */
  for (let i = trails.length - 1; i >= 0; i--) {
    const t = trails[i];
    t.life -= 0.04;
    if (t.life <= 0) { trails.splice(i, 1); continue; }
    fwCtx.fillStyle = t.color;
    fwCtx.globalAlpha = t.life * 0.6;
    fwCtx.beginPath();
    fwCtx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
    fwCtx.fill();
  }

  /* Rockets */
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.x += r.vx;
    r.y += r.vy;
    r.vy += 0.06; /* gravité légère */
    /* Trail */
    if (r.trailFrames % 2 === 0) {
      trails.push({ x: r.x + (Math.random() - 0.5) * 3, y: r.y + 5, color: r.color, size: 1.5 + Math.random(), life: 0.6 });
    }
    r.trailFrames++;

    fwCtx.globalAlpha = 1;
    fwCtx.fillStyle = r.color;
    fwCtx.beginPath();
    fwCtx.arc(r.x, r.y, 2.5, 0, Math.PI * 2);
    fwCtx.fill();

    /* Halo */
    const halo = fwCtx.createRadialGradient(r.x, r.y, 0, r.x, r.y, 12);
    halo.addColorStop(0, r.color);
    halo.addColorStop(1, 'transparent');
    fwCtx.fillStyle = halo;
    fwCtx.beginPath();
    fwCtx.arc(r.x, r.y, 12, 0, Math.PI * 2);
    fwCtx.fill();

    if (r.y <= r.explodeY) {
      explodeRocket(r);
      rockets.splice(i, 1);
    }
  }

  /* Sparks */
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += s.gravity;
    s.vx *= s.friction;
    s.vy *= s.friction;
    s.life -= s.decay;
    if (s.life <= 0) { sparks.splice(i, 1); continue; }

    if (s.trail && Math.random() < 0.3) {
      trails.push({ x: s.x, y: s.y, color: s.color, size: s.size * 0.7, life: 0.4 });
    }

    fwCtx.fillStyle = s.color;
    fwCtx.globalAlpha = Math.min(1, s.life);
    fwCtx.beginPath();
    fwCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    fwCtx.fill();
  }

  fwCtx.globalAlpha = 1;
  fwCtx.globalCompositeOperation = 'source-over';
}

/* ════════════════════════════════════════════════
   BOUCLE DE RENDU
═══════════════════════════════════════════════════ */
let frameCount = 0;
function animate() {
  frameCount++;
  const elapsed = performance.now() - T0;

  /* Phase 1 : planète tourne */
  if (!explosionState.triggered) {
    planet.rotation.y    += 0.0035;
    clouds.rotation.y    += 0.0045;
    clouds.rotation.x    += 0.0008;
    planetGroup.rotation.x = Math.sin(elapsed * 0.0003) * 0.05;
  }

  /* Étoiles parallaxe (rotation lente) */
  stars3D.rotation.y += 0.00015;
  stars3D.rotation.x += 0.00008;

  /* Phase 2 : explosion en cours */
  if (explosionState.triggered) {
    const expElapsed = (performance.now() - explosionState.startTime) / 1000;

    /* Flash */
    if (explosionState.flash) {
      const f = explosionState.flash;
      f.scale.setScalar(1 + expElapsed * 5);
      f.material.opacity = Math.max(0, 1 - expElapsed * 1.6);
      if (f.material.opacity <= 0) {
        scene.remove(f);
        explosionState.flash = null;
      }
    }

    /* Shockwaves */
    explosionState.shockwaves = explosionState.shockwaves.filter(sw => {
      const age = (performance.now() - sw.born) / 1000;
      sw.mesh.scale.setScalar(1 + age * sw.speed);
      sw.mesh.material.opacity = Math.max(0, 0.85 - age * 0.7);
      sw.mesh.lookAt(camera.position);
      if (sw.mesh.material.opacity <= 0) {
        scene.remove(sw.mesh);
        return false;
      }
      return true;
    });

    /* Fragments rocheux */
    explosionState.fragments.forEach(f => {
      f.mesh.position.add(f.vel);
      f.mesh.rotation.x += f.angVel.x;
      f.mesh.rotation.y += f.angVel.y;
      f.mesh.rotation.z += f.angVel.z;
      f.vel.multiplyScalar(0.992);
      /* Fade emissive */
      if (f.mat.emissiveIntensity > 0) f.mat.emissiveIntensity *= 0.985;
      /* Fade après 4s */
      if (expElapsed > 4) {
        f.mat.transparent = true;
        f.mat.opacity = Math.max(0, 1 - (expElapsed - 4) * 0.5);
      }
    });

    /* Poussière */
    if (explosionState.dust) {
      const d = explosionState.dust;
      const pos = d.mesh.geometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.array[i*3]   += d.vel[i].x;
        pos.array[i*3+1] += d.vel[i].y;
        pos.array[i*3+2] += d.vel[i].z;
        d.vel[i].multiplyScalar(0.985);
      }
      pos.needsUpdate = true;
      d.mesh.material.opacity = Math.max(0, 0.9 - expElapsed * 0.18);
    }
  }

  renderer.render(scene, camera);

  /* Feux d'artifice */
  if (fwActive || sparks.length > 0 || rockets.length > 0 || trails.length > 0) {
    updateFireworks();
  }

  requestAnimationFrame(animate);
}

/* ════════════════════════════════════════════════
   TIMELINE
═══════════════════════════════════════════════════ */

/* Cacher le "Chargement…" dès que Three.js a rendu une frame */
setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
}, 300);

/* Explosion */
setTimeout(triggerExplosion, TIMELINE.EXPLOSION);

/* Feux d'artifice */
let fwInterval;
setTimeout(() => {
  fwActive = true;
  spawnRocket();
  setTimeout(spawnRocket, 200);
  fwInterval = setInterval(() => {
    spawnRocket();
    if (Math.random() < 0.4) setTimeout(spawnRocket, 80 + Math.random() * 200);
  }, 320);

  /* Affiche le titre final pendant les feux */
  const tb = document.getElementById('title-block');
  tb.classList.remove('fade-out');
  tb.classList.add('reveal');
  tb.querySelector('.title-main').textContent = 'agents-ia.re';
  tb.querySelector('.title-sub').textContent = 'L\'IA pour la Réunion · 974';
}, TIMELINE.FIREWORKS);

/* Stop des nouveaux feux d'artifice (laisse les sparks finir) */
setTimeout(() => {
  fwActive = false;
  clearInterval(fwInterval);
}, TIMELINE.FW_END);

/* Fade final + redirect */
setTimeout(() => {
  document.body.style.transition = 'opacity 0.7s ease';
  document.body.style.opacity = '0';
}, TIMELINE.FINAL_FADE);

setTimeout(goToSite, TIMELINE.REDIRECT);

/* Barre de progression */
const progressBar = document.getElementById('progress');
function updateProgress() {
  const pct = Math.min(100, ((performance.now() - T0) / TIMELINE.REDIRECT) * 100);
  progressBar.style.width = pct + '%';
  if (pct < 100) requestAnimationFrame(updateProgress);
}
requestAnimationFrame(updateProgress);

/* Resize */
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
});

/* Démarre la boucle */
requestAnimationFrame(animate);
</script>
